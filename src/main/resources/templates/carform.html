<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Car form</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>
<body>
	<h1>New Car</h1>
	<!-- FORM -->
	<form action="#" th:action="@{/savecar}"  th:object="${car}" method="post">
	<p>Brand: <input type="text" th:field="${car.brand}" /></p>
	<p>Year: <input type="text" th:field="${car.year}" /></p>
	<input type="submit" value="Submit" /> <input type="reset" value="Reset" />
	</form>
    
</body>
</html>
